<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Space Learning — CE2 · 2025</title>
<script data-goatcounter="https://space-learning.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<style>
:root {
  --noir:#1A1A1A;
  --rouge:#C8311B;
  --bleu:#1B3FA0;
  --jaune:#F2C12E;
  --vert:#2D9C5C;
  --surface-1:#F7F5F0;
  --surface-2:#fff;
  --border:#E3E0D8;
  --border-strong:#BBB;
  --text-primary:#1A1A1A;
  --text-muted:#777;
  --radius:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:#FDFCF9;color:var(--text-primary)}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}

/* HEADER */
#app-header{
  position:sticky;top:0;z-index:100;
  background:var(--noir);
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  gap:12px;
}
#header-left{display:flex;align-items:center;gap:12px}
#header-text .brand{color:#fff;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:3px}
#header-text .sub{color:#999;font-size:11px;letter-spacing:4px;margin-top:2px}
#header-shapes{display:flex;align-items:center;gap:8px}
#header-back-btn{
  display:none;
  background:transparent;border:1px solid #555;color:#fff;
  padding:6px 14px;border-radius:4px;font-size:13px;
  margin-right:8px;
}
#header-back-btn:hover{background:#333}
#header-domain-title{color:#fff;font-size:14px;font-weight:600;display:none}

/* BANDEAU */
#domain-band{height:3px;display:none}

/* MAIN */
#main{padding:24px 16px;max-width:800px;margin:0 auto}

/* ACCUEIL */
.section-title{
  display:flex;align-items:center;gap:10px;
  font-size:18px;font-weight:700;margin-bottom:16px;margin-top:28px;
}
.section-title:first-child{margin-top:0}
.section-badge{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:700;flex-shrink:0;
}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:420px){.cards-grid{grid-template-columns:1fr}}
.card{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
  cursor:pointer;transition:box-shadow .15s,transform .1s;
  display:flex;flex-direction:column;gap:6px;
  position:relative;
}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.card-num{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1px}
.card-name{font-size:14px;font-weight:600;line-height:1.3}
.card-score{
  font-size:11px;font-weight:600;
  padding:2px 8px;border-radius:12px;color:#fff;
  align-self:flex-start;margin-top:2px;
}
.score-todo{background:var(--border-strong);color:var(--text-muted)}

/* ECRAN EXERCICE */
#exercise-screen{display:none;padding:0 0 40px}
.ex-title{font-size:20px;font-weight:700;margin-bottom:20px;padding:0 16px}
.ex-body{padding:0 16px}

/* QCM */
.qcm-question{font-size:16px;font-weight:600;margin-bottom:20px;line-height:1.5}
.qcm-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:380px){.qcm-choices{grid-template-columns:1fr}}
.qcm-btn{
  background:var(--surface-1);border:2px solid var(--border);
  border-radius:var(--radius);padding:12px 10px;
  font-size:15px;text-align:center;transition:all .15s;
}
.qcm-btn:hover:not(:disabled){border-color:var(--border-strong);background:#fff}
.qcm-btn.correct{background:#e8f7ee;border-color:var(--vert);color:var(--vert)}
.qcm-btn.wrong{background:#fdecea;border-color:var(--rouge);color:var(--rouge)}
.qcm-btn:disabled{cursor:default}
.feedback-box{
  background:var(--surface-1);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 14px;
  font-size:14px;line-height:1.5;margin-bottom:16px;display:none;
}
.next-btn{
  background:var(--noir);color:#fff;border:none;
  padding:12px 24px;border-radius:var(--radius);
  font-size:15px;font-weight:600;display:none;
}
.next-btn:hover{opacity:.85}

/* PROGRESS */
.progress-bar-wrap{background:var(--border);border-radius:4px;height:6px;margin-bottom:20px}
.progress-bar-fill{height:6px;border-radius:4px;transition:width .3s}

/* SCORE SCREEN */
#score-screen{display:none;padding:40px 16px;max-width:420px;margin:0 auto;text-align:center}
.score-big{font-size:72px;font-weight:900;line-height:1}
.score-label{font-size:16px;color:var(--text-muted);margin:8px 0 20px}
.score-bar-wrap{background:var(--border);border-radius:6px;height:12px;margin-bottom:20px}
.score-bar-fill{height:12px;border-radius:6px}
.score-msg{font-size:18px;font-weight:700;margin-bottom:24px}
.back-home-btn{
  background:var(--noir);color:#fff;border:none;
  padding:14px 32px;border-radius:var(--radius);
  font-size:16px;font-weight:600;
}
.back-home-btn:hover{opacity:.85}

/* DICTEE */
.dictee-hint{font-size:13px;color:var(--text-muted);margin-bottom:8px}
.play-btn{
  background:var(--surface-1);border:1px solid var(--border-strong);
  border-radius:var(--radius);padding:8px 18px;font-size:14px;margin-bottom:12px;
}
.play-btn:hover{background:var(--border)}
.text-input{
  width:100%;border:2px solid var(--border);border-radius:var(--radius);
  padding:10px 12px;font-size:18px;margin-bottom:10px;
}
.text-input:focus{outline:none;border-color:var(--bleu)}
.validate-btn{
  background:var(--bleu);color:#fff;border:none;
  padding:10px 24px;border-radius:var(--radius);font-size:15px;font-weight:600;
}
.validate-btn:hover{opacity:.85}
.input-feedback{font-size:14px;margin-top:8px;font-weight:600}
.input-feedback.ok{color:var(--vert)}
.input-feedback.ko{color:var(--rouge)}

/* OPERATIONS POSEES */
.op-wrap{font-family:'Courier New',monospace;font-size:22px;text-align:right;margin-bottom:20px;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius);padding:16px 24px;display:inline-block}
.op-line{display:block;padding:2px 0}
.op-sep{border:none;border-top:2px solid var(--text-primary);margin:4px 0}

/* ORDRE CROISSANT */
.slots-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.slot{
  width:70px;height:50px;border:2px dashed var(--border-strong);
  border-radius:var(--radius);display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;cursor:pointer;
  transition:border-color .15s;
}
.slot:hover{border-color:var(--bleu)}
.slot.filled{border-style:solid;border-color:var(--bleu);background:var(--surface-1)}
.tokens-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.token{
  background:var(--bleu);color:#fff;
  width:70px;height:50px;border:none;border-radius:var(--radius);
  font-size:18px;font-weight:700;
}
.token:disabled{opacity:.3;cursor:default}
.token.used{opacity:.3;cursor:default}
.clear-btn{
  background:var(--surface-1);border:1px solid var(--border-strong);
  padding:8px 18px;border-radius:var(--radius);font-size:14px;margin-right:8px;
}
.clear-btn:hover{background:var(--border)}
.validate-ord-btn{
  background:var(--vert);color:#fff;border:none;
  padding:8px 18px;border-radius:var(--radius);font-size:14px;font-weight:600;display:none;
}

/* CHRONO */
.chrono-wrap{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.chrono-circle{position:relative;width:60px;height:60px;flex-shrink:0}
.chrono-circle svg{transform:rotate(-90deg)}
.chrono-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.chrono-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:8px}
.chrono-bar-fill{height:8px;border-radius:4px;background:var(--bleu);transition:width .5s linear,background .5s}
.live-score{font-size:15px;font-weight:600;color:var(--text-muted)}
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--surface-1);border:1px solid var(--border);color:var(--text-muted);margin-left:8px;vertical-align:middle}

/* DROITE GRADUEE */
.grad-svg{display:block;width:100%;max-width:500px;margin-bottom:20px}

/* FLUENCE */
.fluence-text{
  font-size:17px;line-height:2;background:var(--surface-1);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:16px;
}
.fluence-line{display:flex;align-items:baseline;gap:8px}
.fluence-line-words{flex:1}
.fluence-line-count{font-size:12px;color:var(--text-muted);flex-shrink:0;text-align:right;min-width:28px}
.fluence-word{cursor:default}
.fluence-word.clickable{cursor:pointer;border-bottom:2px solid transparent}
.fluence-word.clickable:hover{border-bottom-color:var(--bleu)}
.fluence-word.selected{background:var(--jaune);border-radius:2px}
.fluence-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.fluence-start-btn{
  background:var(--vert);color:#fff;border:none;
  padding:10px 20px;border-radius:var(--radius);font-size:15px;font-weight:600;
}
.fluence-start-btn:disabled{opacity:.5;cursor:default}
.fluence-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:8px;min-width:80px}
.fluence-bar-fill{height:8px;border-radius:4px;background:var(--vert);transition:width .5s linear}
.fluence-timer{font-size:18px;font-weight:700;min-width:40px}
.fluence-score-note{font-size:13px;color:var(--text-muted);margin-top:8px}
</style>
</head>
<body>

<header id="app-header">
  <div id="header-left">
    <button id="header-back-btn" onclick="goHome()">← Retour</button>
    <svg id="logo-svg" width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="20" cy="20" r="6" fill="#F2C12E"/>
      <!-- ellipse 0° -->
      <ellipse cx="20" cy="20" rx="18" ry="7" fill="none" stroke="#1B3FA0" stroke-width="2"/>
      <!-- ellipse 60° -->
      <ellipse cx="20" cy="20" rx="18" ry="7" fill="none" stroke="#1B3FA0" stroke-width="2" transform="rotate(60 20 20)"/>
      <!-- ellipse -60° -->
      <ellipse cx="20" cy="20" rx="18" ry="7" fill="none" stroke="#1B3FA0" stroke-width="2" transform="rotate(-60 20 20)"/>
      <!-- electrons -->
      <circle cx="38" cy="20" r="2.5" fill="#C8311B"/>
      <circle cx="29" cy="5.3" r="2.5" fill="#F2C12E"/>
      <circle cx="11" cy="34.7" r="2.5" fill="#2D9C5C"/>
    </svg>
    <div id="header-text">
      <div class="brand">Space Learning</div>
      <div class="sub">CE2 · 2025</div>
    </div>
    <span id="header-domain-title"></span>
  </div>
  <div id="header-shapes" style="display:flex;align-items:center;gap:10px">
    <a href="index.html" style="color:#ccc;font-size:12px;font-weight:600;text-decoration:none;border:1px solid #555;border-radius:4px;padding:5px 10px;white-space:nowrap;" onmouseover="this.style.background='#333';this.style.color='#fff'" onmouseout="this.style.background='';this.style.color='#ccc'">🏠 Niveaux</a>
    <a href="epreuves.html" style="color:#ccc;font-size:12px;font-weight:600;text-decoration:none;border:1px solid #555;border-radius:4px;padding:5px 10px;white-space:nowrap;" onmouseover="this.style.background='#333';this.style.color='#fff'" onmouseout="this.style.background='';this.style.color='#ccc'">Épreuves →</a>
    <a href="#" onclick="showProgressScreen();return false;" style="color:#ccc;font-size:12px;font-weight:600;text-decoration:none;border:1px solid #555;border-radius:4px;padding:5px 10px;white-space:nowrap;" onmouseover="this.style.background='#333';this.style.color='#fff'" onmouseout="this.style.background='';this.style.color='#ccc'">📊 Mes progrès</a>
    <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="7" fill="#1B3FA0"/></svg>
    <svg width="13" height="13" viewBox="0 0 13 13"><rect width="13" height="13" fill="#C8311B"/></svg>
    <svg width="14" height="12" viewBox="0 0 14 12"><polygon points="7,0 14,12 0,12" fill="#F2C12E"/></svg>
  </div>
</header>
<div id="domain-band"></div>

<div id="main">
  <!-- ACCUEIL -->
  <div id="home-screen">
    <div class="section-title">
      <span class="section-badge" style="background:var(--bleu)">M</span>
      Mathématiques
    </div>
    <div class="cards-grid" id="math-grid"></div>
    <div class="section-title" style="margin-top:32px">
      <span class="section-badge" style="background:var(--rouge)">F</span>
      Français
    </div>
    <div class="cards-grid" id="fr-grid"></div>
  </div>

  <!-- EXERCICE -->
  <div id="exercise-screen">
    <div class="ex-body" id="ex-body"></div>
  </div>

  <!-- SCORE -->
  <div id="score-screen">
    <div class="score-big" id="sc-big"></div>
    <div class="score-label" id="sc-label"></div>
    <div class="score-bar-wrap"><div class="score-bar-fill" id="sc-bar"></div></div>
    <div class="score-msg" id="sc-msg"></div>
    <button class="back-home-btn" onclick="goHome()">← Retour à l'accueil</button>
  </div>

  <!-- PROGRES -->
  <div id="progress-screen" style="display:none;padding:24px 16px 40px;max-width:900px;margin:0 auto">
    <button id="header-back-btn2" onclick="goHome()" style="background:transparent;border:1px solid var(--border-strong);color:var(--text-primary);padding:6px 14px;border-radius:4px;font-size:13px;margin-bottom:16px">← Retour</button>
    <div class="section-title" style="margin-top:0">📊 Mes progrès</div>
    <div id="progress-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px"></div>
    <div class="section-title">✅ Points forts</div>
    <div id="progress-strengths" style="margin-bottom:28px"></div>
    <div class="section-title">🎯 À travailler en priorité</div>
    <div id="progress-weaknesses" style="margin-bottom:28px"></div>
    <button class="back-home-btn" onclick="resetProgressHistory()">Réinitialiser mon historique</button>
  </div>
</div>

<script>
// ===================== UTILS =====================
function shuf(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}
function tts(txt,rate,cb){
  if(!window.speechSynthesis)return cb&&cb();
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='fr-FR';u.rate=rate||1;
  if(cb)u.onend=cb;
  speechSynthesis.speak(u);
}
function clearTimer(){
  if(window._exTimer){clearInterval(window._exTimer);window._exTimer=null;}
}
function navigate(el,title,color){
  clearTimer();
  speechSynthesis.cancel();
  document.getElementById('home-screen').style.display='none';
  document.getElementById('score-screen').style.display='none';
  document.getElementById('progress-screen').style.display='none';
  document.getElementById('exercise-screen').style.display='block';
  document.getElementById('header-back-btn').style.display='inline-block';
  document.getElementById('header-domain-title').style.display='block';
  document.getElementById('header-domain-title').textContent=title;
  document.getElementById('logo-svg').style.display='none';
  document.getElementById('header-text').style.display='none';
  const band=document.getElementById('domain-band');
  band.style.display='block';band.style.background=color;
  document.getElementById('ex-body').innerHTML='';
  el();
}
function goHome(){
  clearTimer();
  speechSynthesis.cancel();
  document.getElementById('home-screen').style.display='block';
  document.getElementById('exercise-screen').style.display='none';
  document.getElementById('score-screen').style.display='none';
  document.getElementById('progress-screen').style.display='none';
  document.getElementById('header-back-btn').style.display='none';
  document.getElementById('header-domain-title').style.display='none';
  document.getElementById('logo-svg').style.display='';
  document.getElementById('header-text').style.display='';
  document.getElementById('domain-band').style.display='none';
  renderHome();
}

// ===================== SCORES =====================
const scores={};
function saveScore(id,bon,total){
  scores[id]={bon,total};
  saveAttempt(id,bon,total,'entrainement');
}

// ===================== PROGRESSION (localStorage) =====================
const PROGRESS_KEY='spaceLearningProgress_CE2';
function saveAttempt(domaine,bon,total,source){
  try{
    let data;
    try{data=JSON.parse(localStorage.getItem(PROGRESS_KEY))||{attempts:[]};}
    catch(e){data={attempts:[]};}
    if(!Array.isArray(data.attempts))data.attempts=[];
    data.attempts.push({ts:Date.now(),domaine,bon,total,source});
    localStorage.setItem(PROGRESS_KEY,JSON.stringify(data));
  }catch(e){/* localStorage indisponible : on ignore silencieusement */}
}
function loadProgressData(){
  try{
    const data=JSON.parse(localStorage.getItem(PROGRESS_KEY))||{attempts:[]};
    if(!Array.isArray(data.attempts))data.attempts=[];
    return data;
  }catch(e){return{attempts:[]};}
}
function domainStats(id){
  const data=loadProgressData();
  const list=data.attempts.filter(a=>a.domaine===id).sort((a,b)=>a.ts-b.ts);
  if(list.length===0)return{count:0,pct:0,trend:'none'};
  let sb=0,st=0;
  list.forEach(a=>{sb+=a.bon;st+=a.total;});
  const pct=st>0?Math.round(sb/st*100):0;
  let trend='none';
  if(list.length>=2){
    const recent=list.slice(-3);
    const prev=list.slice(-6,-3);
    if(recent.length>=1&&prev.length>=1){
      const avg=arr=>{let b=0,t=0;arr.forEach(a=>{b+=a.bon;t+=a.total;});return t>0?(b/t*100):0;};
      const rAvg=avg(recent),pAvg=avg(prev);
      if(rAvg-pAvg>3)trend='up';
      else if(pAvg-rAvg>3)trend='down';
      else trend='stable';
    }
  }
  return{count:list.length,pct,trend};
}
function trendArrow(trend){
  if(trend==='up')return'<span style="color:var(--vert)">↗</span>';
  if(trend==='down')return'<span style="color:var(--rouge)">↘</span>';
  if(trend==='stable')return'<span style="color:var(--text-muted)">→</span>';
  return'<span style="color:var(--border-strong)">—</span>';
}
function badgeColor(count,pct){
  if(count===0)return'var(--border-strong)';
  if(pct>=80)return'var(--vert)';
  if(pct>=50)return'var(--jaune)';
  return'var(--rouge)';
}
function allDomainsList(){
  return MATH_DOMAINS.map(d=>({id:d.id,name:d.name,color:'var(--bleu)'}))
    .concat(FR_DOMAINS.map(d=>({id:d.id,name:d.name,color:'var(--rouge)'})));
}
function showProgressScreen(){
  clearTimer();
  speechSynthesis.cancel();
  document.getElementById('home-screen').style.display='none';
  document.getElementById('exercise-screen').style.display='none';
  document.getElementById('score-screen').style.display='none';
  document.getElementById('header-back-btn').style.display='none';
  document.getElementById('header-domain-title').style.display='none';
  document.getElementById('domain-band').style.display='none';
  document.getElementById('progress-screen').style.display='block';
  renderProgressScreen();
}
function renderProgressScreen(){
  const domains=allDomainsList();
  const grid=document.getElementById('progress-grid');
  grid.innerHTML=domains.map(d=>{
    const s=domainStats(d.id);
    const bg=badgeColor(s.count,s.pct);
    return `<div class="card" style="cursor:default">
      <div class="card-num" style="color:${d.color}">${d.id}</div>
      <div class="card-name">${d.name}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
        <span class="card-score" style="background:${bg}">${s.count>0?s.pct+'%':'—'}</span>
        <span style="font-size:12px;color:var(--text-muted)">${s.count} tentative${s.count>1?'s':''}</span>
        ${trendArrow(s.trend)}
      </div>
    </div>`;
  }).join('');

  const withStats=domains.map(d=>({...d,...domainStats(d.id)}));
  const strong=withStats.filter(d=>d.count>=2&&d.pct>=80).sort((a,b)=>b.pct-a.pct);
  const weak=withStats.filter(d=>d.count>=1&&d.pct<50).sort((a,b)=>(b.count-a.count)||(a.pct-b.pct));

  const strEl=document.getElementById('progress-strengths');
  if(strong.length===0){
    strEl.innerHTML='<p style="color:var(--text-muted);font-size:14px">Pas encore de points forts identifiés — continue à t\'entraîner !</p>';
  }else{
    strEl.innerHTML='<div class="cards-grid">'+strong.map(d=>`<div class="card"><div class="card-num" style="color:${d.color}">${d.id}</div><div class="card-name">${d.name}</div><span class="card-score" style="background:var(--vert)">${d.pct}%</span></div>`).join('')+'</div>';
  }
  const weakEl=document.getElementById('progress-weaknesses');
  if(weak.length===0){
    weakEl.innerHTML='<p style="color:var(--text-muted);font-size:14px">Rien à signaler pour l\'instant, bravo !</p>';
  }else{
    weakEl.innerHTML='<div class="cards-grid">'+weak.map(d=>`<div class="card"><div class="card-num" style="color:${d.color}">${d.id}</div><div class="card-name">${d.name}</div><span class="card-score" style="background:var(--rouge)">${d.pct}%</span></div>`).join('')+'</div>';
  }
}
function resetProgressHistory(){

// ===================== SCORE SCREEN =====================
function showScore(bon,total,color){
  clearTimer();
  speechSynthesis.cancel();
  document.getElementById('exercise-screen').style.display='none';
  document.getElementById('score-screen').style.display='block';
  const pct=total>0?Math.round(bon/total*100):0;
  document.getElementById('sc-big').textContent=bon;
  document.getElementById('sc-big').style.color=color;
  document.getElementById('sc-label').textContent='bonne'+(bon>1?'s':'')+' réponse'+(bon>1?'s':'')+' sur '+total;
  const bar=document.getElementById('sc-bar');
  bar.style.width=pct+'%';bar.style.background=color;
  let msg='Continue !';
  if(pct>=90)msg='Excellent !';
  else if(pct>=70)msg='Bien !';
  else if(pct>=50)msg='En progrès !';
  document.getElementById('sc-msg').textContent=msg;
}

// ===================== QCM GENERIQUE =====================
function qcmScreen(items,getQ,getChoices,getCorrect,getExpl,color,domId){
  const body=document.getElementById('ex-body');
  let idx=0,bon=0;
  const shuffled=shuf(items);

  function progBar(){
    return `<div class="progress-bar-wrap"><div class="progress-bar-fill" id="qcm-prog" style="width:${Math.round(idx/shuffled.length*100)}%;background:${color}"></div></div>`;
  }

  function render(){
    if(idx>=shuffled.length){saveScore(domId,bon,shuffled.length);showScore(bon,shuffled.length,color);return;}
    const item=shuffled[idx];
    const q=getQ(item);
    const choices=shuf(getChoices(item));
    const correct=getCorrect(item);
    const expl=getExpl(item);
    body.innerHTML=progBar()+
      `<p class="qcm-question">${q}</p>
      <div class="qcm-choices" id="qcm-choices">${choices.map(c=>`<button class="qcm-btn" onclick="qcmAns(this,'${esc(c)}','${esc(correct)}')">${c}</button>`).join('')}</div>
      <div class="feedback-box" id="fb">${expl}</div>
      <button class="next-btn" id="nxt" onclick="qcmNext()">Suivant →</button>`;
  }
  window.qcmAns=function(btn,ans,correct){
    const all=document.querySelectorAll('.qcm-btn');
    all.forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('correct');});
    if(ans===correct){btn.classList.add('correct');bon++;}
    else btn.classList.add('wrong');
    document.getElementById('fb').style.display='block';
    document.getElementById('nxt').style.display='inline-block';
  };
  window.qcmNext=function(){idx++;render();};
  render();
}
function esc(s){return String(s).replace(/'/g,"\\'");}

// --- M2 : decomposition C/D/U (formes standard et non-standard) ---
function genM2(){
  const type=randInt(0,3);
  let n,parts;
  if(type===0){
    const c=randInt(1,9),d=randInt(0,9),u=randInt(0,9);
    n=c*100+d*10+u;parts=[{n:c,t:'C'},{n:d,t:'D'},{n:u,t:'U'}];
  }else if(type===1){
    const d=randInt(1,9),u=randInt(0,9);
    n=d*10+u;parts=[{n:d,t:'D'},{n:u,t:'U'}];
  }else if(type===2){
    const d=randInt(2,90);
    n=d*10;parts=[{n:d,t:'D'}];
  }else{
    const extraU=randInt(10,39);const d=randInt(0,9);
    n=extraU+d*10;parts=[{n:extraU,t:'U'},{n:d,t:'D'}];
    if(Math.random()<0.4){const c=randInt(1,5);n+=c*100;parts.push({n:c,t:'C'});}
  }
  return {parts:shuf(parts),n};
}
function m2Distractors(n){
  const cands=new Set();
  const s=String(n);
  if(s.length>=2){
    const a=s.split('');const b=[...a];[b[0],b[1]]=[b[1],b[0]];
    const v=parseInt(b.join(''),10);if(v!==n&&!isNaN(v)&&v>=0)cands.add(v);
  }
  [10,-10,100,-100,1,-1,2,-2].forEach(d=>{const v=n+d;if(v>=0&&v!==n)cands.add(v);});
  if(n>=100)cands.add(n%100);
  let arr=shuf([...cands]).slice(0,3);
  while(arr.length<3){const v=randInt(0,999);if(v!==n&&!arr.includes(v))arr.push(v);}
  return arr;
}

// --- M3 : 4 nombres proches (2 ou 3 chiffres) ---
function genM3(){
  const is3=Math.random()<0.5;
  const lo=is3?100:10,hi=is3?999:99;
  const spread=is3?randInt(5,40):randInt(2,12);
  const base=randInt(lo+spread,hi-spread);
  const set=new Set();let guard=0;
  while(set.size<4&&guard<80){guard++;const v=base+randInt(-spread,spread);if(v>=lo&&v<=hi)set.add(v);}
  while(set.size<4)set.add(randInt(lo,hi));
  return [...set];
}

// --- M4 : addition posee (2 ou 3 termes) ---
function genM4(){
  const nTerms=Math.random()<0.7?2:3;
  let terms,result;
  do{
    terms=[];
    for(let i=0;i<nTerms;i++)terms.push(randInt(10,i===0?600:300));
    result=terms.reduce((a,b)=>a+b,0);
  }while(result>999);
  return {terms:terms.map(String),result};
}

// --- M9 : nombre cible + 5 distracteurs plausibles ---
function genM9(){
  const n=Math.random()<0.5?randInt(10,99):randInt(100,999);
  const s=String(n);
  const cands=new Set();
  if(s.length>=2){const a=s.split('');const b=[...a];[b[0],b[1]]=[b[1],b[0]];const v=parseInt(b.join(''),10);if(v!==n&&v>0)cands.add(v);}
  if(s.length===3){const a=s.split('');const b=[...a];[b[1],b[2]]=[b[2],b[1]];const v=parseInt(b.join(''),10);if(v!==n&&v>0)cands.add(v);}
  [1,-1,10,-10].forEach(d=>{const v=n+d;if(v>0&&v!==n)cands.add(v);});
  let guard=0;
  while(cands.size<5&&guard<50){guard++;const v=n+randInt(-15,15);if(v>0&&v!==n)cands.add(v);}
  const choices=shuf([n,...[...cands].slice(0,5)]);
  return {n,choices};
}

// --- M10 : droite graduee (bornes/pas coherents, cible pile sur un trait) ---
const M10_CONFIGS=[[0,10,1],[0,20,2],[0,50,5],[0,100,10],[50,100,5],[100,200,10],[200,300,10],[0,1000,100]];
function genM10(){
  const [min,max,step]=M10_CONFIGS[randInt(0,M10_CONFIGS.length-1)];
  const steps=(max-min)/step;
  const k=randInt(1,steps-1);
  return {min,max,step,val:min+k*step};
}

function genF5(){

  const key=noun.genre+noun.nombre;
  const exp=adj[key];
  return {q:noun.det+' '+noun.mot+' …',correct:exp,choices:[adj.ms,adj.mp,adj.fs,adj.fp],expl:'Accord avec « '+noun.mot+' » ('+(noun.genre==='m'?'masculin':'féminin')+' '+(noun.nombre==='s'?'singulier':'pluriel')+') → '+exp+'.'};
}

function cardHTML(d,color){
  const s=scores[d.id];
  let badge;
  if(!s)badge=`<span class="card-score score-todo">à faire</span>`;
  else badge=`<span class="card-score" style="background:${color}">${s.bon}/${s.total} ✓</span>`;
  return `<div class="card" onclick="launch('${d.id}')"><div class="card-num">${d.id}</div><div class="card-name">${d.name}</div>${badge}</div>`;
}

}

// ===================== LAUNCH =====================
function launch(id){
  const dom=MATH_DOMAINS.find(d=>d.id===id)||FR_DOMAINS.find(d=>d.id===id);
  const color=id.startsWith('M')?'#1B3FA0':'#C8311B';
  navigate(()=>EXERCISES[id](), dom.name, color);
}

const EXERCISES={};

// M1 Écriture des nombres
EXERCISES.M1=function(){
  const items=Array.from({length:10},()=>genM1());
  let idx=0,bon=0;
  const body=document.getElementById('ex-body');
  function prog(){return `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${Math.round(idx/items.length*100)}%;background:#1B3FA0"></div></div>`;}
  function render(){
    if(idx>=items.length){saveScore('M1',bon,items.length);showScore(bon,items.length,'#1B3FA0');return;}
    const it=items[idx];
    const hint=it.n<100?'nombre à 2 chiffres':'nombre à 3 chiffres';
    body.innerHTML=prog()+
      `<p class="dictee-hint">Écris en chiffres le nombre que tu entends</p>
      <p class="dictee-hint" id="m1-hint">Indice : ${hint}</p>
      <button class="play-btn" id="m1-play" onclick="m1Play()">▶ Écouter</button><br>
      <input class="text-input" type="number" id="m1-inp" placeholder="Tape le nombre…" style="max-width:200px">
      <div class="input-feedback" id="m1-fb"></div>
      <br><button class="validate-btn" id="m1-val" style="margin-top:8px" onclick="m1Val()">Valider</button>`;
    setTimeout(()=>m1Play(),400);
    document.getElementById('m1-inp').addEventListener('keydown',e=>{if(e.key==='Enter')m1Val();});
  }
  window.m1Play=function(){
    const it=items[idx];
    tts(it.w,0.9,()=>setTimeout(()=>tts(it.w,0.9),400));
  };
  window.m1Val=function(){
    const inp=document.getElementById('m1-inp');
    const val=parseInt(inp.value);
    const it=items[idx];
    const fb=document.getElementById('m1-fb');
    if(isNaN(val)){fb.textContent='Entre un nombre.';fb.className='input-feedback ko';return;}
    if(val===it.n){
      fb.textContent='✓ Correct !';fb.className='input-feedback ok';bon++;
    }else{
      fb.textContent='✗ La réponse était '+it.n;fb.className='input-feedback ko';
    }
    inp.disabled=true;
    document.getElementById('m1-val').disabled=true;
    document.getElementById('m1-play').disabled=true;
    setTimeout(()=>{idx++;render();},1200);
  };
  render();
};

};

// M3 Ordre croissant
EXERCISES.M3=function(){
  const series=Array.from({length:8},()=>genM3());
  let idx=0,bon=0;
  const body=document.getElementById('ex-body');
  function prog(){return `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${Math.round(idx/series.length*100)}%;background:#1B3FA0"></div></div>`;}
  let slotArr=[];
  function render(){
    if(idx>=series.length){saveScore('M3',bon,series.length);showScore(bon,series.length,'#1B3FA0');return;}
    const nums=series[idx];
    slotArr=[null,null,null,null];
    const tokens=shuf([...nums]);
    body.innerHTML=prog()+
      `<p class="qcm-question">Range ces nombres du plus petit au plus grand :</p>
      <div class="slots-row" id="slots-row">${[0,1,2,3].map(i=>`<div class="slot" id="slot-${i}" onclick="slotClick(${i})"></div>`).join('')}</div>
      <div class="tokens-row" id="tokens-row">${tokens.map((t,i)=>`<button class="token" id="tok-${i}" onclick="tokenClick(${i},${t})">${t}</button>`).join('')}</div>
      <button class="clear-btn" onclick="clearSlots()">Effacer</button>
      <button class="validate-ord-btn" id="val-ord" onclick="valOrd()">Valider ✓</button>
      <div class="input-feedback" id="ord-fb"></div>`;
  }
  window.tokenClick=function(ti,val){
    const nextSlot=slotArr.indexOf(null);
    if(nextSlot===-1)return;
    slotArr[nextSlot]=val;
    document.getElementById('slot-'+nextSlot).textContent=val;
    document.getElementById('slot-'+nextSlot).classList.add('filled');
    document.getElementById('tok-'+ti).classList.add('used');
    document.getElementById('tok-'+ti).disabled=true;
    if(slotArr.indexOf(null)===-1)document.getElementById('val-ord').style.display='inline-block';
  };
  window.slotClick=function(si){
    if(slotArr[si]===null)return;
    // find which token has this value and re-enable it
    const val=slotArr[si];
    const toks=document.querySelectorAll('.token');
    for(const t of toks){
      if(parseInt(t.textContent)===val&&t.disabled){t.disabled=false;t.classList.remove('used');break;}
    }
    slotArr[si]=null;
    document.getElementById('slot-'+si).textContent='';
    document.getElementById('slot-'+si).classList.remove('filled');
    document.getElementById('val-ord').style.display='none';
  };
  window.clearSlots=function(){
    slotArr=[null,null,null,null];
    for(let i=0;i<4;i++){document.getElementById('slot-'+i).textContent='';document.getElementById('slot-'+i).classList.remove('filled');}
    document.querySelectorAll('.token').forEach(t=>{t.disabled=false;t.classList.remove('used');});
    document.getElementById('val-ord').style.display='none';
    document.getElementById('ord-fb').textContent='';
  };
  window.valOrd=function(){
    const nums=series[idx];
    const sorted=[...nums].sort((a,b)=>a-b);
    const correct=JSON.stringify(slotArr)===JSON.stringify(sorted);
    const fb=document.getElementById('ord-fb');
    if(correct){fb.textContent='✓ Correct !';fb.className='input-feedback ok';bon++;}
    else{fb.textContent='✗ L\'ordre correct était : '+sorted.join(' < ');fb.className='input-feedback ko';}
    document.getElementById('val-ord').disabled=true;
    document.querySelectorAll('.token').forEach(t=>t.disabled=true);
    setTimeout(()=>{idx++;render();},1500);
  };
  render();
};

// M7 Tables d'addition (chrono 60s)
EXERCISES.M7=function(){
  const body=document.getElementById('ex-body');
  let bon=0,total=0,running=false;
  const DURATION=60;
  let remaining=DURATION;

  function genQuestion(){
    const a=Math.floor(Math.random()*11);
    const b=Math.floor(Math.random()*11);
    const c=a+b;
    const type=Math.floor(Math.random()*3);
    if(type===0)return{q:`${a} + ${b} = ?`,ans:c};
    if(type===1)return{q:`${a} + ? = ${c}`,ans:b};
    return{q:`? + ${b} = ${c}`,ans:a};
  }

  let currentQ=genQuestion();
  function circleColor(r){
    if(r<=10)return'#C8311B';
    if(r<=20)return'#F2C12E';
    return'#1B3FA0';
  }
  function circleHTML(r){
    const pct=r/DURATION;
    const circ=2*Math.PI*25;
    const dash=circ*pct;
    const col=circleColor(r);
    return `<svg width="60" height="60" viewBox="0 0 60 60"><circle cx="30" cy="30" r="25" fill="none" stroke="#E3E0D8" stroke-width="5"/><circle cx="30" cy="30" r="25" fill="none" stroke="${col}" stroke-width="5" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="0" transform="rotate(-90 30 30)"/></svg>`;
  }
  function render(){
    body.innerHTML=
      `<div class="chrono-wrap">
        <div class="chrono-circle" id="m7-circle">${circleHTML(remaining)}</div>
        <div style="flex:1">
          <div class="live-score" id="m7-score">${bon} / ${total}</div>
        </div>
        <span id="m7-time" style="font-size:18px;font-weight:700">${remaining}s</span>
      </div>
      <p class="qcm-question" id="m7-q">${currentQ.q}</p>
      <input class="text-input" type="number" id="m7-inp" style="max-width:120px" placeholder="?">
      <div class="input-feedback" id="m7-fb"></div>
      <button class="validate-btn" style="margin-top:8px" onclick="m7Val()">Valider</button>`;
    document.getElementById('m7-inp').focus();
    document.getElementById('m7-inp').addEventListener('keydown',e=>{if(e.key==='Enter')m7Val();});
    if(!running){
      running=true;
      window._exTimer=setInterval(()=>{
        remaining--;
        const cEl=document.getElementById('m7-circle');
        const tEl=document.getElementById('m7-time');
        if(cEl)cEl.innerHTML=circleHTML(remaining);
        if(tEl)tEl.textContent=remaining+'s';
        if(remaining<=0){
          clearTimer();
          saveScore('M7',bon,total||1);
          showScore(bon,total||1,'#1B3FA0');
        }
      },1000);
    }
  }
  window.m7Val=function(){
    const inp=document.getElementById('m7-inp');

    else{fb.textContent='✗ '+currentQ.ans;fb.className='input-feedback ko';}
    document.getElementById('m7-score').textContent=bon+' / '+total;
    currentQ=genQuestion();

// M9 Lecture des nombres — TTS + choix
function numToFr(n){
  if(n===0)return'zéro';
  const units=['','un','deux','trois','quatre','cinq','six','sept','huit','neuf',
    'dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf'];
  const tens=['','dix','vingt','trente','quarante','cinquante','soixante','soixante','quatre-vingts','quatre-vingt'];
  function below100(n){
    if(n<20)return units[n];
    const t=Math.floor(n/10);const u=n%10;
    if(t===7){
      if(u===1)return'soixante et onze';
      return'soixante-'+units[10+u];
    }
    if(t===8){
      if(u===0)return'quatre-vingts';
      return'quatre-vingt-'+units[u];
    }
    if(t===9)return'quatre-vingt-'+units[10+u];
    if(u===0)return tens[t];
    if(u===1)return tens[t]+' et un';
    return tens[t]+'-'+units[u];
  }
  function below1000(n){
    if(n<100)return below100(n);
    const c=Math.floor(n/100);const r=n%100;
    let s='';
    if(c===1)s='cent';
    else s=units[c]+' cent'+(r===0&&c>1?'s':'');
    if(r===0)return s;
    return s+' '+below100(r);
  }
  return below1000(n);
}

        return `<span class="${cls}" id="fw-${i}" ${click}>${w} </span>`;
      }).join('');
      return `<div class="fluence-line"><span class="fluence-line-words">${spans}</span><span class="fluence-line-count">${wi}</span></div>`;
    }).join('');
  }

  function render(){
    body.innerHTML=
      `<p style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Lis ce texte à voix haute pendant 1 minute. Quand le temps s'arrête, clique sur le dernier mot lu.</p>
      <div class="fluence-controls">
        <button class="fluence-start-btn" id="fl-start" onclick="fluenceStart()">▶ Démarrer</button>
        <div class="fluence-bar-wrap"><div class="fluence-bar-fill" id="fl-bar" style="width:100%"></div></div>
        <span class="fluence-timer" id="fl-time">1:00</span>
      </div>
      <div class="fluence-text" id="fl-text">${renderText(false)}</div>
      <div id="fl-score-wrap" style="display:none">
        <p style="font-size:14px;margin-bottom:12px">Clique sur le dernier mot que tu as lu :</p>
      </div>`;
  }

  window.fluenceStart=function(){
    if(started)return;
    started=true;
    document.getElementById('fl-start').disabled=true;
    elapsed=0;
    window._exTimer=setInterval(()=>{
      elapsed++;
      const r=DURATION-elapsed;
      const barEl=document.getElementById('fl-bar');
      const tEl=document.getElementById('fl-time');
      if(barEl)barEl.style.width=(r/DURATION*100)+'%';
      if(tEl){const m=Math.floor(r/60);const s=r%60;tEl.textContent=m+':'+(s<10?'0':'')+s;}
      if(elapsed>=DURATION){
        clearTimer();
        finished=true;
        // make words clickable
        document.getElementById('fl-text').innerHTML=renderText(true);
        const sw=document.getElementById('fl-score-wrap');
        if(sw)sw.style.display='block';
      }
    },1000);
  };

  window.fluenceWordClick=function(i){
    if(!finished)return;
    selectedWord=i;
    document.getElementById('fl-text').innerHTML=renderText(true);
    const wpm=i+1;
    // show inline result
    let msg,note='';
    if(wpm>=90)msg='Excellent !';
    else if(wpm>=70)msg='Bien !';
    else if(wpm>=50)msg='Moyenne CE2';
    else{msg='Lis chaque jour !';note='Objectif fin CE2 : 90 mots/min';}
    const pct=Math.min(wpm/90*100,100);
    const sw=document.getElementById('fl-score-wrap');
    if(sw)sw.innerHTML=`
      <p style="font-size:14px;margin-bottom:12px">Tu as lu <strong>${wpm} mots</strong> en 1 minute.</p>
      <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%;background:#C8311B"></div></div>
      <p style="font-size:18px;font-weight:700;margin:12px 0">${msg}</p>
      ${note?`<p class="fluence-score-note">${note}</p>`:''}
      <button class="back-home-btn" style="margin-top:12px" onclick="goHome()">← Retour à l'accueil</button>`;
    saveScore('F8',wpm,90);
  };
  render();
};

// ===================== INIT =====================
renderHome();
</script>
</body>
</html>
